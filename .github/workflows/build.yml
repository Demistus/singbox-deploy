name: Build and Push Bot

on:
  push:
    branches: [ main ]
    paths:
      - 'docker/Dockerfile.bot'
      - 'configs/bot/telegram_bot.py'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Convert repository name to lowercase
        id: repo
        run: |
          echo "LOWER_REPO=${GITHUB_REPOSITORY@L}" >> $GITHUB_OUTPUT
      
      - name: Build and push Bot image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.bot
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.LOWER_REPO }}/bot:latest
            ghcr.io/${{ steps.repo.outputs.LOWER_REPO }}/bot:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
